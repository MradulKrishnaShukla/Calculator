<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Calculator</title>
  <style>

    :root {
      --bg:      #000000;
      --surface: #0A0A0A;
      --btn:     #1A1A1A;
      --btnU:    #262626;
      --text:    #FFFFFF;
      --text2:   #555555;
      --acc:     #FFFFFF;
      --accT:    #000000;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* iOS touch improvements */
    button {
      touch-action: manipulation;          /* Removes 300ms tap delay on iOS */
      -webkit-tap-highlight-color: transparent; /* No grey flash on tap */
      -webkit-appearance: none;            /* Consistent look on iOS */
      outline: none;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, 'Segoe UI', sans-serif;
      padding: 20px;
    }

    .wrapper {
      position: relative;
      width: 318px;
      transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .wrapper.sci { width: 648px; }

    .calculator {
      background: var(--surface);
      border-radius: 28px;
      padding: 16px 16px 20px;
      width: 100%;
    }

    /* ── TOP ROW ──────────────────────────────────────────────────── */
    .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .mode-btn {
      background: transparent;
      border: 1px solid var(--text2);
      color: var(--text2);
      width: 36px; height: 28px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .mode-btn:hover { color: var(--text); border-color: var(--text); }
    .mode-btn.on { background: var(--acc); color: var(--accT); border-color: var(--acc); }

    .theme-dots { display: flex; gap: 8px; }
    .theme-dot {
      width: 14px; height: 14px;
      border-radius: 50%; border: none;
      cursor: pointer; flex-shrink: 0;
      transition: transform 0.15s;
    }
    .theme-dot:hover { transform: scale(1.3); }

    /* ── SCREEN ───────────────────────────────────────────────────── */
    .screen {
      padding: 0 4px 10px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      gap: 1px;
      min-height: 110px;
    }

    /* Small indicators: DEG/RAD and memory M */
    .screen-meta {
      width: 100%;
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-bottom: 2px;
    }
    .meta-tag {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text2);
      border: 1px solid var(--text2);
      padding: 1px 5px;
      border-radius: 3px;
    }
    .meta-tag.hidden { display: none; }
    .meta-tag.active { color: var(--acc); border-color: var(--acc); }

    #expr-line {
      width: 100%;
      text-align: right;
      color: var(--text);
      font-size: 30px;
      font-weight: 300;
      word-break: break-all;
      line-height: 1.3;
    }
    #result-line {
      width: 100%;
      text-align: right;
      color: var(--text2);
      font-size: 20px;
      font-weight: 300;
      min-height: 26px;
    }

    .divider { height: 1px; background: var(--text2); opacity: 0.12; margin: 0 0 12px; }

    /* ── BUTTON AREA ──────────────────────────────────────────────── */
    .btn-area { display: flex; gap: 0; }

    .sci-section {
      width: 0; overflow: hidden; opacity: 0;
      flex-shrink: 0;
      display: flex; flex-direction: column; gap: 8px;
      transition: width 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.25s;
    }
    .wrapper.sci .sci-section {
      width: 296px; opacity: 1;
      padding-right: 10px; margin-right: 10px;
      border-right: 1px solid rgba(128,128,128,0.1);
    }

    .reg-section { flex: 1; display: flex; flex-direction: column; gap: 8px; }

    .row { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }

    /* ── BUTTONS ──────────────────────────────────────────────────── */
    .btn {
      height: 60px; border-radius: 12px; border: none;
      font-size: 20px; font-weight: 500;
      cursor: pointer; font-family: inherit;
      background: var(--btn); color: var(--text);
      transition: opacity 0.1s, transform 0.1s;
    }
    .wrapper.sci .btn { height: 54px; font-size: 17px; }
    .btn:active { opacity: 0.55; transform: scale(0.92); }

    .btn.utility { background: var(--btnU); color: var(--text2); font-size: 13px; font-weight: 700; }
    .wrapper.sci .btn.utility { font-size: 12px; }

    .btn.operator { background: var(--acc); color: var(--accT); font-size: 22px; }
    .btn.operator.lit { background: var(--text); color: var(--acc); }

    /* Scientific function buttons */
    .btn.sfn { background: var(--btnU); color: var(--text2); font-size: 12px; font-weight: 500; }
    .btn.sfn.on { background: var(--acc); color: var(--accT); } /* 2nd active state */

    /* ── HISTORY PANEL ────────────────────────────────────────────── */
    .hist-panel {
      display: none; position: absolute; inset: 0;
      background: var(--surface); border-radius: 28px;
      padding: 16px; z-index: 20; flex-direction: column;
    }
    .hist-panel.open { display: flex; }
    .hist-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .hist-title { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text); }
    .hist-close { background: var(--btn); border: none; color: var(--text2); width: 26px; height: 26px; border-radius: 50%; font-size: 14px; cursor: pointer; font-family: inherit; }
    .hist-close:hover { color: var(--text); }
    .hist-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 7px; }
    .hist-empty { color: var(--text2); font-size: 13px; text-align: center; padding-top: 24px; }
    .hist-item { background: var(--btn); border-radius: 10px; padding: 10px 12px; cursor: pointer; transition: opacity 0.15s; }
    .hist-item:hover { opacity: 0.7; }
    .hist-expr { color: var(--text2); font-size: 12px; margin-bottom: 3px; }
    .hist-res  { color: var(--text); font-size: 22px; font-weight: 400; text-align: right; }
    .hist-clear { margin-top: 10px; background: var(--btn); border: none; color: var(--text2); font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 10px; border-radius: 10px; cursor: pointer; font-family: inherit; width: 100%; }
    .hist-clear:hover { color: var(--text); }

  </style>
</head>
<body>

  <div class="wrapper" id="wrapper">
    <div class="calculator">

      <div class="top-row">
        <button class="mode-btn" id="sci-btn" onclick="toggleSci()" title="Scientific mode">
          <svg width="20" height="10" viewBox="0 0 22 12" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round">
            <path d="M1 6 C3.5 1,5.5 1,8 6 C10.5 11,12.5 11,15 6 C17.5 1,19.5 1,22 6"/>
          </svg>
        </button>
        <div class="theme-dots">
          <button class="theme-dot" data-theme="black" title="Pure Black" style="background:#1a1a1a"></button>
          <button class="theme-dot" data-theme="white" title="Pure White" style="background:#d8d8d8"></button>
        </div>
        <button class="mode-btn" onclick="openHist()" title="History">
          <svg width="16" height="16" viewBox="0 0 16 16" stroke="currentColor" fill="none" stroke-width="1.6" stroke-linecap="round">
            <circle cx="8" cy="8" r="6.5"/><path d="M8 4.5v3.5l2.5 1.5"/>
          </svg>
        </button>
      </div>

      <div class="screen">
        <div class="screen-meta">
          <span class="meta-tag" id="ind-mem" style="display:none">M</span>
          <span class="meta-tag active" id="ind-mode" style="display:none">RAD</span>
        </div>
        <div id="expr-line">0</div>
        <div id="result-line"></div>
      </div>

      <div class="divider"></div>

      <div class="btn-area">

        <!-- Scientific section (hidden until sci mode) -->
        <div class="sci-section" id="sci-section">

          <!-- Row 1: 2nd  π  (  ) -->
          <div class="row">
            <button class="btn sfn" id="b-2nd" onclick="toggle2nd()" title="Shift to 2nd functions">2nd</button>
            <button class="btn sfn" id="b-pi"  onclick="sf('pi')">π</button>
            <button class="btn sfn" id="b-op"  onclick="sf('op')">(</button>
            <button class="btn sfn" id="b-cp"  onclick="sf('cp')">)</button>
          </div>

          <!-- Row 2: x²  √  xʸ  Ans -->
          <div class="row">
            <button class="btn sfn" id="b-sq"   onclick="sf('sq')">x²</button>
            <button class="btn sfn" id="b-sqrt" onclick="sf('sqrt')">√</button>
            <button class="btn sfn" id="b-pow"  onclick="sf('pow')">xʸ</button>
            <button class="btn sfn" id="b-ans"  onclick="sf('ans')">Ans</button>
          </div>

          <!-- Row 3: sin  cos  tan  log -->
          <div class="row">
            <button class="btn sfn" id="b-sin" onclick="sf('sin')">sin</button>
            <button class="btn sfn" id="b-cos" onclick="sf('cos')">cos</button>
            <button class="btn sfn" id="b-tan" onclick="sf('tan')">tan</button>
            <button class="btn sfn" id="b-log" onclick="sf('log')">log</button>
          </div>

          <!-- Row 4: sin⁻¹  cos⁻¹  tan⁻¹  ln -->
          <div class="row">
            <button class="btn sfn" id="b-asin" onclick="sf('asin')" style="font-size:10px">sin⁻¹</button>
            <button class="btn sfn" id="b-acos" onclick="sf('acos')" style="font-size:10px">cos⁻¹</button>
            <button class="btn sfn" id="b-atan" onclick="sf('atan')" style="font-size:10px">tan⁻¹</button>
            <button class="btn sfn" id="b-ln"   onclick="sf('ln')">ln</button>
          </div>

          <!-- Row 5: n!  nCr  nPr  DEL -->
          <div class="row">
            <button class="btn sfn" id="b-fact" onclick="sf('fact')">n!</button>
            <button class="btn sfn" id="b-ncr"  onclick="sf('ncr')" style="font-size:11px">nCr</button>
            <button class="btn sfn" id="b-npr"  onclick="sf('npr')" style="font-size:11px">nPr</button>
            <button class="btn sfn" id="b-del"  onclick="sf('del')">DEL</button>
          </div>

        </div>

        <!-- Regular buttons (always visible) -->
        <div class="reg-section">
          <div class="row">
            <button class="btn utility"  onclick="clearAll()">AC</button>
            <button class="btn utility"  onclick="toggleSign()">+/-</button>
            <button class="btn utility"  onclick="inputPct()">%</button>
            <button class="btn operator" id="op-÷" onclick="inputOp('÷')">÷</button>
          </div>
          <div class="row">
            <button class="btn" onclick="inputNum('7')">7</button>
            <button class="btn" onclick="inputNum('8')">8</button>
            <button class="btn" onclick="inputNum('9')">9</button>
            <button class="btn operator" id="op-×" onclick="inputOp('×')">×</button>
          </div>
          <div class="row">
            <button class="btn" onclick="inputNum('4')">4</button>
            <button class="btn" onclick="inputNum('5')">5</button>
            <button class="btn" onclick="inputNum('6')">6</button>
            <button class="btn operator" id="op-−" onclick="inputOp('−')">−</button>
          </div>
          <div class="row">
            <button class="btn" onclick="inputNum('1')">1</button>
            <button class="btn" onclick="inputNum('2')">2</button>
            <button class="btn" onclick="inputNum('3')">3</button>
            <button class="btn operator" id="op-+" onclick="inputOp('+')">+</button>
          </div>
          <div class="row">
            <button class="btn" onclick="inputNum('0')">0</button>
            <button class="btn" onclick="dblZero()" style="font-size:15px;letter-spacing:0.03em">00</button>
            <button class="btn" onclick="inputDot()">.</button>
            <button class="btn operator" onclick="calculate()">=</button>
          </div>
        </div>

      </div>

      <!-- History panel -->
      <div class="hist-panel" id="hist-panel">
        <div class="hist-head">
          <span class="hist-title">History</span>
          <button class="hist-close" onclick="closeHist()">×</button>
        </div>
        <div class="hist-list" id="hist-list">
          <p class="hist-empty">No calculations yet.</p>
        </div>
        <button class="hist-clear" onclick="clearHistory()">Clear All</button>
      </div>

    </div>
  </div>

<script>

// ════════════════════════════════════════════════════════════════════
//  THEMES
// ════════════════════════════════════════════════════════════════════
const themes = {
  black: { bg:'#000000', surface:'#0A0A0A', btn:'#1A1A1A', btnU:'#262626', text:'#FFFFFF', text2:'#555555', acc:'#FFFFFF', accT:'#000000' },
  white: { bg:'#FFFFFF', surface:'#F2F2F2', btn:'#E6E6E6', btnU:'#D4D4D4', text:'#111111', text2:'#888888', acc:'#111111', accT:'#FFFFFF' },
};

function setTheme(k) {
  const t = themes[k], r = document.documentElement;
  r.style.setProperty('--bg',      t.bg);
  r.style.setProperty('--surface', t.surface);
  r.style.setProperty('--btn',     t.btn);
  r.style.setProperty('--btnU',    t.btnU);
  r.style.setProperty('--text',    t.text);
  r.style.setProperty('--text2',   t.text2);
  r.style.setProperty('--acc',     t.acc);
  r.style.setProperty('--accT',    t.accT);
  document.querySelectorAll('.theme-dot').forEach(d => {
    d.style.outline       = d.dataset.theme === k ? `2.5px solid ${t.text}` : 'none';
    d.style.outlineOffset = '2px';
  });
}
document.querySelectorAll('.theme-dot').forEach(d => d.addEventListener('click', () => setTheme(d.dataset.theme)));
setTheme('black');


// ════════════════════════════════════════════════════════════════════
//  SCI / HISTORY MODES
// ════════════════════════════════════════════════════════════════════
let sciOn = false;
function toggleSci() {
  sciOn = !sciOn;
  document.getElementById('wrapper').classList.toggle('sci', sciOn);
  document.getElementById('sci-btn').classList.toggle('on', sciOn);
}

function openHist()  { renderHistory(); document.getElementById('hist-panel').classList.add('open'); }
function closeHist() { document.getElementById('hist-panel').classList.remove('open'); }


// ════════════════════════════════════════════════════════════════════
//  HISTORY
// ════════════════════════════════════════════════════════════════════
const histLog = [];

function renderHistory() {
  const list = document.getElementById('hist-list');
  list.innerHTML = histLog.length === 0
    ? '<p class="hist-empty">No calculations yet.</p>'
    : histLog.map((h, i) =>
        `<div class="hist-item" onclick="useHistItem(${i})">
           <div class="hist-expr">${h.expr} =</div>
           <div class="hist-res">${h.res}</div>
         </div>`
      ).join('');
}

function useHistItem(i) {
  curNum = histLog[i].res; exprStr = ''; resultMode = false; pDepth = 0;
  resetPct(); resetStyles(); refresh(); closeHist();
}

function clearHistory() { histLog.length = 0; renderHistory(); }

function pushHistory(expr, res) {
  histLog.unshift({ expr, res });
  if (histLog.length > 30) histLog.pop();
  lastAns = res;
}


// ════════════════════════════════════════════════════════════════════
//  2nd MODE  +  DEG / RAD  +  MEMORY
// ════════════════════════════════════════════════════════════════════
let secondMode = false;
let degMode    = true;   // true = degrees, false = radians
let memVal     = 0;
let memHasVal  = false;
let lastAns    = null;

// Table of all scientific buttons: key → { label, fn, label2, fn2 }
// fn2 is the 2nd-mode function
const SFN = {
  // Row 1
  pi:    { l:'π',     f:()=>inputConst(Math.PI),         l2:'M+',   f2:()=>memAdd()      },
  op:    { l:'(',     f:()=>openParen(),                  l2:'MR',   f2:()=>memRecall()   },
  cp:    { l:')',     f:()=>closeParen(),                 l2:'MC',   f2:()=>memClear()    },
  // Row 2
  sq:    { l:'x²',   f:()=>applyFn('sq'),                l2:'x³',   f2:()=>applyFn('cb')   },
  sqrt:  { l:'√',    f:()=>applyFn('sqrt'),              l2:'³√',   f2:()=>applyFn('cbrt') },
  pow:   { l:'xʸ',   f:()=>inputOp('^'),                 l2:'mod',  f2:()=>inputOp('mod')  },
  ans:   { l:'Ans',  f:()=>insertAns(),                  l2:'abs',  f2:()=>applyFn('abs')  },
  // Row 3
  sin:   { l:'sin',  f:()=>applyFn('sin'),               l2:'sinh', f2:()=>applyFn('sinh') },
  cos:   { l:'cos',  f:()=>applyFn('cos'),               l2:'cosh', f2:()=>applyFn('cosh') },
  tan:   { l:'tan',  f:()=>applyFn('tan'),               l2:'tanh', f2:()=>applyFn('tanh') },
  log:   { l:'log',  f:()=>applyFn('log'),               l2:'10ˣ',  f2:()=>applyFn('pow10')},
  // Row 4
  asin:  { l:'sin⁻¹',f:()=>applyFn('asin'),             l2:'asinh',f2:()=>applyFn('asinh')},
  acos:  { l:'cos⁻¹',f:()=>applyFn('acos'),             l2:'acosh',f2:()=>applyFn('acosh')},
  atan:  { l:'tan⁻¹',f:()=>applyFn('atan'),             l2:'atanh',f2:()=>applyFn('atanh')},
  ln:    { l:'ln',   f:()=>applyFn('ln'),                l2:'eˣ',   f2:()=>applyFn('expE') },
  // Row 5
  fact:  { l:'n!',   f:()=>applyFn('fact'),              l2:'⌊x⌋',  f2:()=>applyFn('floor')},
  ncr:   { l:'nCr',  f:()=>inputOp('nCr'),               l2:'⌈x⌉',  f2:()=>applyFn('ceil') },
  npr:   { l:'nPr',  f:()=>inputOp('nPr'),               l2:'1/x',  f2:()=>applyFn('inv')  },
  del:   { l:'DEL',  f:()=>delLast(),                    l2:degMode?'→RAD':'→DEG', f2:()=>toggleDegRad()},
};

function sf(key) {
  const d = SFN[key];
  if (!d) return;
  (secondMode && d.f2) ? d.f2() : d.f();
}

function toggle2nd() {
  secondMode = !secondMode;
  // Update all button labels
  Object.entries(SFN).forEach(([key, d]) => {
    const btn = document.getElementById('b-' + key);
    if (!btn) return;
    const lbl = secondMode ? (d.l2 || d.l) : d.l;
    btn.textContent = lbl;
    const len = lbl.length;
    btn.style.fontSize = len >= 6 ? '9px' : len >= 5 ? '10px' : len >= 4 ? '11px' : '';
  });
  // Keep sin⁻¹ etc. small always
  ['b-asin','b-acos','b-atan'].forEach(id => {
    const btn = document.getElementById(id);
    if (btn && !secondMode) btn.style.fontSize = '10px';
  });
  document.getElementById('b-2nd').classList.toggle('on', secondMode);
}

function toggleDegRad() {
  degMode = !degMode;
  const ind = document.getElementById('ind-mode');
  if (degMode) {
    ind.style.display = 'none';       // DEG is default — no indicator needed
  } else {
    ind.textContent    = 'RAD';
    ind.style.display  = '';          // Show RAD as a warning
  }
  SFN.del.l2 = degMode ? '→RAD' : '→DEG';
  if (secondMode) {
    const btn = document.getElementById('b-del');
    if (btn) btn.textContent = SFN.del.l2;
  }
}

function memAdd() {
  if (!curNum || curNum === '0') return;
  memVal += parseFloat(curNum);
  memHasVal = true;
  document.getElementById('ind-mem').style.display = '';
}

function memRecall() {
  if (!memHasVal) return;
  curNum = displayNum(memVal);
  if (resultMode) { resultMode = false; resetStyles(); }
  if (isPercent) resetPct();
  refresh();
}

function memClear() {
  memVal = 0; memHasVal = false;
  document.getElementById('ind-mem').style.display = 'none';
}

function insertAns() {
  if (lastAns === null) return;
  if (resultMode) { exprStr = ''; curNum = null; resultMode = false; pDepth = 0; resetStyles(); }
  if (curNum !== null && curNum !== '0') { exprStr += curNum + ' × '; }
  curNum = String(lastAns);
  resetPct();
  refresh();
}


// ════════════════════════════════════════════════════════════════════
//  SMART DISPLAY FORMATTER
//  Full IEEE 754 double precision (15-16 sig figs) internally.
//  Only rounds at the display stage — better than any physical calc.
// ════════════════════════════════════════════════════════════════════
function displayNum(n) {
  if (n === 'Error' || typeof n !== 'number') return String(n);
  if (isNaN(n) || !isFinite(n)) return 'Error';
  if (n === 0) return '0';

  // Fix floating-point artifacts: if rounding to 12 sig figs changes the value
  // by less than 1 part in 10^10, the difference is pure floating-point noise.
  const r12 = parseFloat(n.toPrecision(12));
  if (r12 !== 0 && Math.abs(r12 - n) / Math.abs(r12) < 1e-10) n = r12;

  // Whole numbers up to safe integer range: show exactly
  if (Number.isInteger(n) && Math.abs(n) <= 9007199254740992) return n.toString();

  // Very large / very small: clean scientific notation
  if (Math.abs(n) >= 1e12 || (Math.abs(n) < 1e-7 && n !== 0)) {
    return n.toExponential(9)
            .replace(/\.?0+(e)/, '$1')
            .replace('e+', 'e')
            .replace(/e(-?)0*(\d)/, 'e$1$2');
  }

  // Normal decimal — strip trailing zeros
  return parseFloat(n.toPrecision(12)).toString();
}


// ════════════════════════════════════════════════════════════════════
//  CALCULATOR STATE
// ════════════════════════════════════════════════════════════════════
let exprStr    = '';
let curNum     = null;
let resultMode = false;
let pDepth     = 0;
let isPercent  = false;
let pctBase    = null;

const exprEl = document.getElementById('expr-line');
const resEl  = document.getElementById('result-line');
const OP_IDS = { '÷':'op-÷', '×':'op-×', '−':'op-−', '+':'op-+' };

function escH(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function resolvePct() {
  const n = parseFloat(curNum);
  if (isNaN(n)) return null;
  return pctBase !== null ? pctBase * n / 100 : n / 100;
}

function getDisplay() {
  if (!exprStr && curNum === null) return '0';
  if (curNum === null) return exprStr;
  if (!exprStr) return isPercent ? curNum + '%' : curNum;
  return exprStr + (isPercent ? curNum + '%' : curNum);
}

// Helper: compute nCr and nPr for embedding in expressions
function _nCr(n, r) {
  n = Math.round(n); r = Math.round(r);
  if (n < 0 || r < 0 || r > n) return NaN;
  if (r === 0 || r === n) return 1;
  if (r > n - r) r = n - r;
  let res = 1;
  for (let i = 0; i < r; i++) { res = res * (n - i) / (i + 1); }
  return Math.round(res);
}
function _nPr(n, r) {
  n = Math.round(n); r = Math.round(r);
  if (n < 0 || r < 0 || r > n) return NaN;
  let res = 1;
  for (let i = 0; i < r; i++) { res *= (n - i); if (!isFinite(res)) return Infinity; }
  return res;
}

function safeEval(str) {
  try {
    let js = str
      .replace(/×/g,'*').replace(/÷/g,'/').replace(/−/g,'-').replace(/\^/g,'**');
    // Resolve nCr, nPr, mod in the expression string
    js = js.replace(/([\d.]+)\s*nCr\s*([\d.]+)/gi, (_, a, b) => {
      const v = _nCr(parseFloat(a), parseFloat(b));
      return isNaN(v) ? '(0/0)' : String(v);
    });
    js = js.replace(/([\d.]+)\s*nPr\s*([\d.]+)/gi, (_, a, b) => {
      const v = _nPr(parseFloat(a), parseFloat(b));
      return isNaN(v) ? '(0/0)' : String(v);
    });
    js = js.replace(/\bmod\b/gi, '%');
    const clean = js.replace(/\s*[+\-*/%]\s*$/, '').trim();
    if (!clean) return null;
    const res = Function('"use strict"; return (' + clean + ')')();
    if (typeof res !== 'number' || isNaN(res)) return null;
    if (!isFinite(res)) return 'Error';
    return res; // FULL precision — displayNum rounds only at display time
  } catch(_) { return null; }
}

function refresh() {
  exprEl.style.color = 'var(--text)';

  if (isPercent && curNum !== null) {
    const pctVal = resolvePct();
    const hint   = (pctVal !== null && exprStr.trim())
      ? ' <span style="color:var(--text2);font-size:0.78em">(' + displayNum(pctVal) + ')</span>'
      : '';
    exprEl.innerHTML = escH(exprStr) + escH(curNum)
      + '<span style="color:var(--text2)">%</span>' + hint;
    scaleExpr((exprStr + curNum).replace(/\s/g,'').length);

    if (pctVal !== null && exprStr.trim()) {
      const res = safeEval(exprStr + String(pctVal));
      showRunning(res);
    } else { resEl.textContent = ''; }

  } else {
    const d = getDisplay();
    exprEl.textContent = d;
    scaleExpr(d.replace(/\s/g,'').length);

    const hasOp = /[+×÷−\^]/.test(d) || d.includes('(') || /nCr|nPr|mod/i.test(d);
    const res   = hasOp ? safeEval(d) : null;
    showRunning(res);
  }
}

function scaleExpr(len) {
  exprEl.style.fontSize = len>22?'16px': len>16?'20px': len>10?'24px': '30px';
}

function showRunning(res) {
  if (res !== null) {
    resEl.textContent   = res === 'Error' ? 'Error' : '= ' + displayNum(res);
    resEl.style.fontSize = '20px';
    resEl.style.color   = 'var(--text2)';
  } else { resEl.textContent = ''; }
}

function resetStyles() {
  exprEl.style.fontSize = resEl.style.fontSize = '';
  exprEl.style.color    = resEl.style.color    = '';
}
function resetPct() { isPercent = false; pctBase = null; }


// ════════════════════════════════════════════════════════════════════
//  INPUT
// ════════════════════════════════════════════════════════════════════

function inputNum(n) {
  if (resultMode || isPercent) {
    exprStr = ''; curNum = n; resultMode = false; pDepth = 0;
    resetPct(); resetStyles();
  } else if (curNum === null) { curNum = n; }
  else { curNum = curNum === '0' ? n : curNum + n; }
  refresh();
}

function dblZero() {
  if (resultMode || isPercent || curNum === null || curNum === '0') return;
  curNum += '00'; refresh();
}

function inputDot() {
  if (resultMode || isPercent) {
    exprStr = ''; curNum = '0.'; resultMode = false; pDepth = 0;
    resetPct(); resetStyles(); refresh(); return;
  }
  if (curNum === null) curNum = '0.';
  else if (!curNum.includes('.')) curNum += '.';
  refresh();
}

function inputOp(op) {
  if (isPercent && curNum !== null) {
    curNum = String(resolvePct() ?? parseFloat(curNum) / 100); resetPct();
  }
  if (resultMode) {
    exprStr = curNum + ' ' + op + ' '; curNum = null; resultMode = false; resetStyles();
  } else if (curNum === null) {
    if (/[)]\s*$/.test(exprStr) || /nCr\s*$|nPr\s*$|mod\s*$/i.test(exprStr.trim())) {
      exprStr += ' ' + op + ' ';
    } else {
      exprStr = exprStr.trimEnd().replace(/\s*[+×÷−\^\%]$|(\s*(nCr|nPr|mod))\s*$/i, '') + ' ' + op + ' ';
    }
  } else {
    exprStr += curNum + ' ' + op + ' '; curNum = null;
  }
  clearOpHL();
  const id = OP_IDS[op];
  if (id) document.getElementById(id)?.classList.add('lit');
  refresh();
}

function openParen() {
  if (resultMode) { exprStr = ''; curNum = null; resultMode = false; pDepth = 0; resetPct(); resetStyles(); }
  if (curNum !== null && curNum !== '0') { exprStr += curNum + ' × '; curNum = null; }
  else if (curNum === null && /[0-9)]\s*$/.test(exprStr)) exprStr += ' × ';
  exprStr += '('; curNum = null; pDepth++;
  refresh();
}

function closeParen() {
  if (pDepth <= 0) return;
  if (curNum !== null) { exprStr += curNum; curNum = null; }
  exprStr += ')'; pDepth--;
  refresh();
}

function inputConst(val) {
  if (resultMode) { exprStr = ''; curNum = null; resultMode = false; pDepth = 0; resetPct(); resetStyles(); }
  if (curNum !== null && curNum !== '0') { exprStr += curNum + ' × '; curNum = null; }
  else if (curNum === null && /[0-9)]\s*$/.test(exprStr)) exprStr += ' × ';
  curNum = String(val); resetPct(); refresh();
}


// ════════════════════════════════════════════════════════════════════
//  SCIENTIFIC FUNCTIONS
//  No toPrecision() rounding on INPUTS or intermediate values.
//  Full IEEE 754 double precision throughout.
//  Only displayNum() rounds at render time.
// ════════════════════════════════════════════════════════════════════

function applyFn(fn) {
  if (curNum === null && !resultMode) return;
  const x = parseFloat(curNum);
  if (isNaN(x)) return;

  const toR  = degMode ? Math.PI / 180 : 1;  // Input angle to radians
  const fromR = degMode ? 180 / Math.PI : 1; // Radians to output angle

  // Remove floating-point noise near zero for trig outputs
  const tClean = v => Math.abs(v) < 1e-14 ? 0 : v;

  let r;
  switch (fn) {
    // Powers & roots
    case 'sq':    r = x * x; break;
    case 'cb':    r = x * x * x; break;
    case 'sqrt':  r = x >= 0 ? Math.sqrt(x) : 'Error'; break;
    case 'cbrt':  r = Math.cbrt(x); break;
    case 'pow10': r = Math.pow(10, x); break;
    case 'expE':  r = Math.exp(x); break;
    case 'inv':   r = x !== 0 ? 1 / x : 'Error'; break;
    case 'abs':   r = Math.abs(x); break;
    case 'floor': r = Math.floor(x); break;
    case 'ceil':  r = Math.ceil(x); break;

    // Trig (degree/radian aware)
    case 'sin':  r = tClean(Math.sin(x * toR)); break;
    case 'cos':  r = tClean(Math.cos(x * toR)); break;
    case 'tan':
      if (degMode && Math.abs(Math.cos(x * toR)) < 1e-14) { r = 'Error'; break; }
      r = tClean(Math.tan(x * toR)); break;

    // Inverse trig (outputs in degrees or radians per mode)
    case 'asin': r = Math.abs(x) <= 1 ? Math.asin(x) * fromR : 'Error'; break;
    case 'acos': r = Math.abs(x) <= 1 ? Math.acos(x) * fromR : 'Error'; break;
    case 'atan': r = Math.atan(x) * fromR; break;

    // Logs
    case 'log': r = x > 0 ? Math.log10(x) : 'Error'; break;
    case 'ln':  r = x > 0 ? Math.log(x)   : 'Error'; break;

    // Hyperbolic (always unitless — no degree conversion)
    case 'sinh':  r = Math.sinh(x); break;
    case 'cosh':  r = Math.cosh(x); break;
    case 'tanh':  r = Math.tanh(x); break;
    case 'asinh': r = Math.asinh(x); break;
    case 'acosh': r = x >= 1 ? Math.acosh(x) : 'Error'; break;
    case 'atanh': r = Math.abs(x) < 1 ? Math.atanh(x) : 'Error'; break;

    // Factorial
    case 'fact': {
      const n = Math.round(x);
      if (n < 0 || n > 170 || Math.abs(x - n) > 0.0001) { r = 'Error'; break; }
      let f = 1; for (let i = 2; i <= n; i++) f *= i;
      r = f; break;
    }
    default: return;
  }

  if (r !== 'Error') {
    // Store full precision — only displayNum() rounds later
    curNum = String(r);
  } else {
    curNum = 'Error';
  }
  resetPct();
  if (resultMode) { resultMode = false; resetStyles(); }
  refresh();
}


// ════════════════════════════════════════════════════════════════════
//  CALCULATE
// ════════════════════════════════════════════════════════════════════

function calculate() {
  if (resultMode) return;

  let displayLabel, evalExpr;
  if (isPercent && curNum !== null) {
    const pctVal = resolvePct();
    if (pctVal === null) return;
    displayLabel = getDisplay();
    evalExpr     = exprStr + String(pctVal);
    resetPct();
  } else {
    displayLabel = getDisplay();
    evalExpr     = displayLabel;
  }

  if (!evalExpr || evalExpr === '0') return;

  // Close open parens
  let expr = evalExpr;
  for (let i = 0; i < pDepth; i++) expr += ')';

  const res = safeEval(expr);
  if (res === null) return;
  const resStr = res === 'Error' ? 'Error' : displayNum(res);

  pushHistory(displayLabel.trim(), resStr);

  exprEl.textContent   = displayLabel.trim() + ' =';
  exprEl.style.fontSize = '16px';
  exprEl.style.color   = 'var(--text2)';
  resEl.textContent    = resStr;
  resEl.style.fontSize = '46px';
  resEl.style.color    = 'var(--text)';

  exprStr = ''; curNum = resStr; resultMode = true; pDepth = 0;
  clearOpHL();
}


// ════════════════════════════════════════════════════════════════════
//  UTILITY
// ════════════════════════════════════════════════════════════════════

function clearAll() {
  exprStr = ''; curNum = null; resultMode = false; pDepth = 0;
  resetPct(); clearOpHL(); resetStyles(); refresh();
}

function delLast() {
  if (resultMode) { clearAll(); return; }
  if (isPercent) { resetPct(); refresh(); return; }
  if (curNum !== null) {
    curNum = curNum.length > 1 ? curNum.slice(0, -1) : null;
    refresh();
  }
}

function toggleSign() {
  if (!curNum || curNum === '0') return;
  curNum = curNum.startsWith('-') ? curNum.slice(1) : '-' + curNum;
  refresh();
}

function inputPct() {
  if (!curNum || curNum === '0') return;
  const baseMatch = exprStr.trim().match(/(-?[\d.]+)\s*[+\-×÷−\^]\s*$/);
  pctBase   = baseMatch ? parseFloat(baseMatch[1]) : null;
  isPercent = true;
  refresh();
}

function clearOpHL() {
  document.querySelectorAll('.btn.operator').forEach(b => b.classList.remove('lit'));
}

</script>
